metadata:
  id: ccc.marefarc.cn
  type: ControlCatalog
  version: v2026.06-rc1
  description: |
    Trimmed sample of the FINOS CCC control catalog, published as the grc.store
    release finos-ccc/ccc.marefarc.cn @ v2026.06-rc1. Kept small but varied: two
    groups, folded-YAML prose, threats/guidelines (dropped on conversion), an
    AR with and without a recommendation, and mixed applicability.
  author:
    id: finos-ccc
    name: FINOS
    type: Human
  applicability-categories:
    - id: tlp_clear
      title: TLP:Clear
      description: Information may be shared without restriction.
    - id: tlp_green
      title: TLP:Green
      description: Information may be shared with partners.
    - id: tlp_amber
      title: TLP:Amber
      description: Information restricted to the organization and partners.
    - id: tlp_red
      title: TLP:Red
      description: Information is restricted to the organization.
title: FINOS Cloud Control Catalog
groups:
  - id: data-protection
    title: Data Protection
    description: |
      Data protection controls ensure data is protected from unauthorized
      access, disclosure, and tampering.
  - id: logging-monitoring
    title: Logging & Monitoring
    description: |
      Controls governing the integrity and protection of access logs.
controls:
  - id: CCC.C01
    group: data-protection
    title: Prevent Unencrypted Requests
    objective: |
      Ensure that all communications are encrypted in transit to protect data
      integrity and confidentiality.
    threats:
      - reference-id: CCC
        entries:
          - reference-id: CCC.TH02
            strength: 7
            remarks: Data is Intercepted in Transit
    guidelines:
      - reference-id: NIST-800-53
        entries:
          - reference-id: SC-8
            strength: 7
          - reference-id: SC-13
            strength: 7
    assessment-requirements:
      - id: CCC.C01.TR01
        text: |
          When a port is exposed for non-SSH network traffic, all traffic MUST
          include a TLS handshake AND be encrypted using TLS 1.2 or higher.
        applicability:
          - tlp_clear
          - tlp_green
          - tlp_amber
          - tlp_red
        recommendation: Most cloud services enable TLS 1.3 by default.
      - id: CCC.C01.TR02
        text: When a port is exposed for SSH traffic, all traffic MUST use SSHv2 or higher.
        applicability:
          - tlp_green
          - tlp_amber
          - tlp_red
  - id: CCC.C09
    group: logging-monitoring
    title: |
      Prevent Tampering, Deletion, or Unauthorized Access
      to Access Logs
    objective: Ensure access logs are protected against tampering and deletion.
    assessment-requirements:
      - id: CCC.C09.TR01
        text: When access logs are stored, they MUST be protected from unauthorized modification.
        applicability:
          - tlp_amber
          - tlp_red
